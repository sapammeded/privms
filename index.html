<body>

t" height="90"></canvas></div><div class="form-card"><canvas id="categoryChart" height="90"></canvas></div></div><div id="registerPane" class="tab-pane"><div class="form-card"><div class="grid-2"><div class="input-field"><label>Full name</label><input type="text" id="regName" placeholder="John Carter"></div><div class="input-field"><label>Company</label><input type="text" id="regCompany" placeholder="PT Nusantara"></div><div class="input-field"><label>Category</label><select id="regCategory"><option value="UMUM">UMUM</option><option value="VIP">VIP</option><option value="VVIP">VVIP</option></select></div><div class="input-field"><label>Purpose</label><select id="regPurpose"><option>Meeting</option><option>Interview</option><option>Service</option><option>Lainnya</option></select><input type="text" id="regCustomPurpose" placeholder="Other purpose" style="margin-top:8px;"></div><div class="input-field"><label>PIC</label><input type="text" id="regPic" placeholder="Budi Santoso"></div><div class="input-field"><label>Department</label><input type="text" id="regDept" placeholder="IT / HR"></div><div class="input-field"><label>Start date</label><input type="date" id="regStartDate"></div><div class="input-field"><label>Expired date</label><input type="date" id="regExpDate"></div><div class="input-field"><label>Photo</label><input type="file" id="regPhotoFile" accept="image/*"><img id="previewPhotoThumb" width="50" style="margin-top:8px; border-radius:12px;"></div></div><div style="display:flex; gap:16px; margin-top:24px;"><button id="walkinBtn">⚡ Walk-in</button><button id="generateQRBtn">🔐 Generate QR</button></div></div></div><div id="scannerPane" class="tab-pane"><div class="form-card"><div style="display:flex; gap:12px; margin-bottom:20px;"><select id="scanMode"><option value="CHECK_IN">CHECK-IN</option><option value="CHECK_OUT">CHECK-OUT</option></select><button id="startCamBtn">📷 Start Camera</button><button id="stopCamBtn" class="btn-outline">Stop</button><button id="uploadQrBtn">🖼️ Upload QR</button><input type="file" id="uploadQrFile" accept="image/*" style="display:none"></div><div id="cameraPreview"></div><div style="margin-top:24px;"><label>Manual REG Number</label><input type="text" id="manualReg" placeholder="REG2026xxxx"><button id="manualProcess" style="margin-top:8px;">Proses</button></div></div></div><div id="logsPane" class="tab-pane"><div class="form-card"><div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:24px;"><input type="text" id="searchLog" placeholder="Cari Nama / REG" style="width:200px;"><button id="refreshLogsBtn">Refresh</button><button id="selectAllBtn">Select all</button><button id="deselectAllBtn">Deselect</button><button id="deleteSelectedBtn" style="background:#b91c1c;">Hapus terpilih</button><button id="deleteAllBtn" style="background:#b91c1c;">Hapus semua</button><button id="exportExcelAction">Export Excel</button><button id="backupAction">Backup</button><button id="resetDatabaseAction" style="background:#92400e;">Reset DB</button></div><div class="table-wrap"><table id="logTable"><thead><tr><th><input type="checkbox" id="checkAllMaster"></th><th>REG</th><th>Nama</th><th>Perusahaan</th><th>Kategori</th><th>Aksi</th><th>Waktu</th><th>Site</th><th>PDF</th></tr></thead><tbody id="logTableBody"></tbody></table></div></div></div></div></div>
<div id="vmsSiteModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); align-items:center; justify-content:center; z-index:10001;"><div style="background:white; border-radius:28px; padding:28px; width:420px; max-width:90%;"><h3>⚙️ Edit Site Names</h3><div style="margin-bottom:16px;"><label>🏭 SITE A</label><input type="text" id="vmsA" style="width:100%; padding:12px; margin-top:5px; border-radius:16px; border:1px solid #ccc;"></div><div style="margin-bottom:16px;"><label>🏢 SITE B</label><input type="text" id="vmsB" style="width:100%; padding:12px; margin-top:5px; border-radius:16px; border:1px solid #ccc;"></div><div style="margin-bottom:16px;"><label>🏬 SITE C</label><input type="text" id="vmsC" style="width:100%; padding:12px; margin-top:5px; border-radius:16px; border:1px solid #ccc;"></div><div style="display:flex; gap:12px;"><button id="vmsSaveBtn" onclick="vmsSite_submit()" style="background:#1f4e4a;">💾 Save</button><button onclick="vmsSite_close()" class="btn-outline">Cancel</button></div></div></div>

<script>
// ==================== FIELD READY VMS v6.0 ====================
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzS5FMsggrsneDPlu2wBDTNyDhlaJwug4xa09c1GGcmbeanhgAdMa1RNx0JLSh-5h3v/exec";
const SYNC_INTERVAL_MS = 10000;

let visitors = {};
let logs = [];
let SITE_ID = localStorage.getItem("vms_site") || "SITE_A";

let isProcessingQueue = false;
let syncQueue = [];
let lastScanTime = {};
let processingRegs = new Set();
let scannerInstance = null;
let isScanning = false;
let currentCameraId = null;
let cameraResetInterval = null;

// ==================== HELPER ====================
function toast(msg, type = "info") {
    let t = document.createElement("div");
    t.className = `toast-msg ${type}`;
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}
window.toast = toast;

function generateReg() {
    let reg;
    let attempts = 0;
    do {
        reg = "REG" + Date.now() + Math.floor(Math.random() * 10000);
        attempts++;
        if (attempts > 10) break;
    } while (visitors[SITE_ID + "_" + reg]);
    return reg;
}

function secureSave() {
    if (Object.keys(visitors).length > 2000) {
        visitors = Object.fromEntries(Object.entries(visitors).slice(-1500));
    }
    localStorage.setItem("vms_visitors", JSON.stringify(visitors));
    localStorage.setItem("vms_logs", JSON.stringify(logs));
}

function secureLoad() {
    try {
        let v = localStorage.getItem("vms_visitors");
        if (v) visitors = JSON.parse(v);
        let l = localStorage.getItem("vms_logs");
        if (l) logs = JSON.parse(l);
        if (logs.length > 2000) logs = logs.slice(0, 1500);
        window.visitors = visitors;
        window.logs = logs;
    } catch (e) { console.warn(e); }
}

function addLocalLog(reg, action) {
    let siteKey = SITE_ID + "_" + reg;
    let v = visitors[siteKey];
    let name = v?.nama || reg;
    let company = v?.perusahaan || "";
    let category = v?.kategori || "UMUM";
    logs.unshift({ reg, name, company, category, action, time: Date.now(), site: SITE_ID });
    if (logs.length > 2000) logs = logs.slice(0, 1500);
    secureSave();
}

// ==================== API ====================
async function apiCall(params) {
    try {
        const formData = new URLSearchParams(params);
        const response = await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: formData.toString()
        });
        if (!response.ok) throw new Error("Network error");
        return await response.json();
    } catch (error) {
        console.error("API Error:", error);
        return { status: "error", message: error.message };
    }
}

async function registerVisitor(reg, data) {
    return await apiCall({
        action: "register", reg, name: data.nama, company: data.perusahaan,
        purpose: data.tujuan, pic: data.pic, start: data.startDate, exp: data.expDate,
        category: data.kategori, dept: data.dept, site: SITE_ID
    });
}

async function walkinVisitor(reg, data) {
    return await apiCall({
        action: "walkin", reg, name: data.nama, company: data.perusahaan,
        purpose: data.tujuan, pic: data.pic, start: data.startDate, exp: data.expDate,
        category: data.kategori, dept: data.dept, site: SITE_ID
    });
}

async function checkinVisitor(reg) { return await apiCall({ action: "checkin", reg }); }
async function checkoutVisitor(reg) { return await apiCall({ action: "checkout", reg }); }
async function generateQRCode(reg, nama, perusahaan, expDate) {
    return await apiCall({ action: "generateqr", reg, nama, perusahaan, expDate });
}
async function validateQRCode(qrData) { return await apiCall({ action: "validateqr", qrData }); }

async function pullFromSheet() {
    try {
        const response = await fetch(APPS_SCRIPT_URL + "?action=pull&t=" + Date.now());
        if (!response.ok) throw new Error("Network error");
        const result = await response.json();
        if (result.status === "success" && result.data) syncVisitorStatus(result.data);
    } catch (err) { console.error("Pull error:", err); }
}

function syncVisitorStatus(sheetData) {
    if (!Array.isArray(sheetData)) return;
    for (let i = 1; i < sheetData.length; i++) {
        const row = sheetData[i];
        const reg = row[8];
        const site = row[12];
        if (!reg || site !== SITE_ID) continue;
        const sheetStatus = row[11] === "IN" ? "IN" : "OUT";
        const key = SITE_ID + "_" + reg;
        if (visitors[key] && visitors[key].currentStatus !== sheetStatus) {
            visitors[key].currentStatus = sheetStatus;
            visitors[key].updatedAt = Date.now();
        }
    }
    secureSave();
    renderDashboard();
    renderLogTable();
}

// ==================== QUEUE ELITE ====================
function updateQueueStatus() {
    let div = document.getElementById("queueStatusIndicator");
    if (!div) {
        div = document.createElement("div");
        div.id = "queueStatusIndicator";
        div.className = "queue-status";
        document.body.appendChild(div);
    }
    div.innerHTML = syncQueue.length ? `📦 Queue: ${syncQueue.length}` : `✅ Field Ready`;
}

function persistQueue() {
    try {
        localStorage.setItem("vms_sync_queue", JSON.stringify(syncQueue));
        updateQueueStatus();
    } catch (e) {}
}

function addToQueue(action, reg, data = null) {
    const exists = syncQueue.some(q =>
        q.action === action && q.reg === reg &&
        JSON.stringify(q.data || {}) === JSON.stringify(data || {})
    );
    if (!exists) {
        syncQueue.push({ id: Date.now() + "_" + reg, action, reg, data, retryCount: 0, timestamp: Date.now() });
        persistQueue();
        if (navigator.onLine) processQueue();
    }
}

async function processQueue() {
    if (isProcessingQueue || syncQueue.length === 0) return;
    isProcessingQueue = true;
    const newQueue = [];
    for (const item of syncQueue) {
        let result;
        try {
            if (item.action === "checkin") result = await checkinVisitor(item.reg);
            else if (item.action === "checkout") result = await checkoutVisitor(item.reg);
            else if (item.action === "register") result = await registerVisitor(item.reg, item.data);
            else if (item.action === "walkin") result = await walkinVisitor(item.reg, item.data);
        } catch (e) { result = { status: "error" }; }
        if (result?.status !== "success") {
            item.retryCount = (item.retryCount || 0) + 1;
            if (item.retryCount <= 3) newQueue.push(item);
            else console.warn("DROP QUEUE:", item);
        }
        await new Promise(r => setTimeout(r, 400));
    }
    syncQueue = newQueue;
    persistQueue();
    isProcessingQueue = false;
}

// ==================== UI RENDER ====================
function renderDashboard() {
    try {
        let v = Object.values(visitors);
        let active = v.filter(x => x.currentStatus === "IN").length;
        let todayCheckins = logs.filter(l => new Date(l.time).toDateString() === new Date().toDateString() && l.action === "CHECK_IN").length;
        let statsWidget = document.getElementById("statsWidget");
        if (statsWidget) {
            statsWidget.innerHTML = `
                <div class="stat-card"><h4>Total Visitors</h4><div class="stat-number">${v.length}</div></div>
                <div class="stat-card"><h4>Active Inside</h4><div class="stat-number">${active}</div></div>
                <div class="stat-card"><h4>Check-ins Today</h4><div class="stat-number">${todayCheckins}</div></div>
            `;
        }
        let last7Days = [], last7Labels = [];
        for (let i = 6; i >= 0; i--) {
            let d = new Date();
            d.setDate(d.getDate() - i);
            last7Labels.push(d.toLocaleDateString("id", { weekday: "short" }));
            let count = logs.filter(l => new Date(l.time).toDateString() === d.toDateString() && l.action === "CHECK_IN").length;
            last7Days.push(count);
        }
        let trendChart = document.getElementById("trendChart");
        if (trendChart && window.Chart) {
            if (window.lineChart) window.lineChart.destroy();
            window.lineChart = new Chart(trendChart, {
                type: "line",
                data: { labels: last7Labels, datasets: [{ label: "Daily Visits", data: last7Days, borderColor: "#1f4e4a", fill: false }] }
            });
        }
        let catCount = { VVIP: 0, VIP: 0, UMUM: 0 };
        v.forEach(x => { if (x.kategori) catCount[x.kategori]++; });
        let categoryChart = document.getElementById("categoryChart");
        if (categoryChart && window.Chart) {
            if (window.pieChart) window.pieChart.destroy();
            window.pieChart = new Chart(categoryChart, {
                type: "pie",
                data: { labels: ["VVIP", "VIP", "UMUM"], datasets: [{ data: [catCount.VVIP, catCount.VIP, catCount.UMUM], backgroundColor: ["#fbbf24", "#94a3b8", "#1f4e4a"] }] }
            });
        }
    } catch (e) { console.error(e); }
}

function renderLogTable() {
    try {
        let search = document.getElementById("searchLog")?.value.toLowerCase() || "";
        let filtered = logs.filter(l => (l.name?.toLowerCase().includes(search) || l.reg?.toLowerCase().includes(search)) && (!l.site || l.site === SITE_ID));
        let tbody = document.getElementById("logTableBody");
        if (!tbody) return;
        tbody.innerHTML = "";
        filtered.slice(0, 500).forEach(l => {
            let row = tbody.insertRow();
            row.insertCell(0).innerHTML = `<input type="checkbox" class="logCheckItem" data-reg="${l.reg}">`;
            row.insertCell(1).innerText = l.reg;
            row.insertCell(2).innerText = l.name;
            row.insertCell(3).innerText = l.company;

// ==================== QR & SCANNER ====================
// ELITE FIX: Fast decode - jika QR berisi REG langsung, tanpa API call
async function processScan(qrText) {
    if (!qrText || typeof qrText !== "string") return false;
    qrText = qrText.trim();
    
    let mode = document.getElementById("scanMode").value;
    let reg = null;
    let visitorData = {};
    
    // ELITE FIX: Langsung ambil REG jika formatnya REGxxx
    if (qrText.startsWith("REG")) {
        reg = qrText;
    } else {
        // Fallback ke API untuk QR lama
        let validation = await validateQRCode(qrText);
        if (validation.status !== "success") {
            toast("QR tidak valid!", "error");
            return false;
        }
        reg = validation.reg;
        visitorData = validation.visitorData || {};
    }
    
    if (!reg) {
        toast("QR tidak valid!", "error");
        return false;
    }
    
    if (lastScanTime[reg] && Date.now() - lastScanTime[reg] < 1500) {
        toast("Scan terlalu cepat", "warning");
        return false;
    }
    lastScanTime[reg] = Date.now();
    if (processingRegs.has(reg)) {
        toast("Sedang diproses", "warning");
        return false;
    }
    processingRegs.add(reg);
    try {
        let siteKey = SITE_ID + "_" + reg;
        let visitor = visitors[siteKey];
        if (!visitor) {
            visitor = {
                nama: visitorData.nama || "Unknown", perusahaan: visitorData.perusahaan || "",
                kategori: "UMUM", tujuan: "-", pic: "-", dept: "-", startDate: "",
                expDate: visitorData.expDate || "", foto: "", sessions: [],
                currentStatus: "OUT", updatedAt: Date.now()
            };
            visitors[siteKey] = visitor;
        }
        let today = new Date();
        let expDate = new Date(visitor.expDate);
        if (expDate && !isNaN(expDate) && today > expDate) {
            toast("Visitor sudah expired!", "error");
            return false;
        }
        if (mode === "CHECK_IN") {
            let hasOpen = visitor.sessions?.some(s => !s.checkOut);
            if (hasOpen) {
                toast("Sudah dalam keadaan CHECK-IN!", "warning");
                return false;
            }
            if (!visitor.sessions) visitor.sessions = [];
            visitor.sessions.push({ checkIn: Date.now(), checkOut: null });
            visitors[siteKey] = { ...visitor, currentStatus: "IN", updatedAt: Date.now() };
            addLocalLog(reg, "CHECK_IN");
            let result = await checkinVisitor(reg);
            if (result.status !== "success") addToQueue("checkin", reg);
            toast(`✅ CHECK-IN ${visitor.nama} berhasil`, "success");
        } else {
            let openSession = visitor.sessions?.find(s => !s.checkOut);
            if (!openSession) {
                toast("Tidak ada sesi CHECK-IN aktif!", "warning");
                return false;
            }
            openSession.checkOut = Date.now();
            visitors[siteKey] = { ...visitor, currentStatus: "OUT", updatedAt: Date.now() };
            addLocalLog(reg, "CHECK_OUT");
            let result = await checkoutVisitor(reg);
            if (result.status !== "success") addToQueue("checkout", reg);
            toast(`✅ CHECK-OUT ${visitor.nama} berhasil`, "success");
        }
        renderDashboard();
        renderLogTable();
        secureSave();
        return true;
    } finally {
        setTimeout(() => processingRegs.delete(reg), 1000);
    }
}

async function generateQRandShow(reg, data) {
    if (data._qrData) {
        let canvas = document.createElement("canvas");
        await QRCode.toCanvas(canvas, data._qrData, { width: 200, margin: 1 });
        return showPreviewWithQR(reg, data, canvas.toDataURL());
    }
    let result = await generateQRCode(reg, data.nama, data.perusahaan, data.expDate);
    if (result.status === "success" && result.qrData) {
        data._qrData = result.qrData;
        let canvas = document.createElement("canvas");
        await QRCode.toCanvas(canvas, result.qrData, { width: 200, margin: 1 });
        showPreviewWithQR(reg, data, canvas.toDataURL());
    } else {
        toast("Gagal generate QR", "error");
    }
}

async function downloadPDF(reg, data) {
    try {
        await ensureJSPDF();
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
        doc.setFillColor(31, 78, 74);
        doc.rect(0, 0, 210, 40, "F");
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.text("INVITATION LETTER", 105, 20, { align: "center" });
        doc.setTextColor(0, 0, 0);
        doc.setFontSize(12);
        doc.setFont(undefined, "bold");
        doc.text("VISITOR INFORMATION", 20, 60);
        let y = 75;
        doc.setFontSize(10);
        doc.setFont(undefined, "normal");
        doc.text(`Name : ${data.nama || "-"}`, 20, y); y += 8;
        doc.text(`Company : ${data.perusahaan || "-"}`, 20, y); y += 8;
        doc.text(`Purpose : ${data.tujuan || "-"}`, 20, y); y += 8;
        doc.text(`PIC : ${data.pic || "-"}`, 20, y); y += 8;
        doc.text(`Department : ${data.dept || "-"}`, 20, y); y += 8;
        doc.text(`REG Number : ${reg}`, 20, y); y += 8;
        doc.text(`Start Date : ${data.startDate || "-"}`, 20, y); y += 8;
        doc.text(`Expired Date : ${data.expDate || "-"}`, 20, y); y += 8;
        doc.text(`Status : ${data.currentStatus === "IN" ? "IN (Inside Area)" : "OUT"}`, 20, y);
        
        let qrData = data._qrData;
        if (!qrData) {
            let qrResult = await generateQRCode(reg, data.nama, data.perusahaan, data.expDate);
            if (qrResult.status === "success") qrData = qrResult.qrData;
        }
        if (qrData) {
            let canvas = document.createElement("canvas");
            await QRCode.toCanvas(canvas, qrData, { width: 150, margin: 1 });
            let qrImage = canvas.toDataURL("image/png");
            doc.addImage(qrImage, "PNG", 140, 70, 50, 50);
        }
        let blob = doc.output("blob");
        let url = URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = `INVITATION_${reg}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 3000);
        toast(`PDF ${reg} berhasil di download`, "success");
        return true;
    } catch (err) {
        console.error("PDF Error:", err);
        toast("Error saat generate PDF", "error");
        return false;
    }
}

async function ensureJSPDF() {
    if (window.jspdf) return true;
    return new Promise(resolve => {
        let i = 0, iv = setInterval(() => {
            if (window.jspdf) { clearInterval(iv); resolve(true); }
            if (i++ > 100) { clearInterval(iv); resolve(false); }
        }, 100);
    });
}

// ==================== SCANNER ANTI FREEZE ====================
async function initScanner() {
    if (scannerInstance) {
        await stopScanner();
        try { await scannerInstance.clear(); } catch(e) {}
        scannerInstance = null;
    }
    try {
        let cameras = await Html5Qrcode.getCameras();
        if (!cameras || cameras.length === 0) {
            toast("Tidak ada kamera terdeteksi", "error");
            return false;
        }
        currentCameraId = cameras[0].id;
        scannerInstance = new Html5Qrcode("cameraPreview");
        return true;
    } catch (err) {
        toast("Gagal inisialisasi kamera", "error");
        return false;
    }
}

async function startScanner() {
    if (isScanning) return;
    if (!scannerInstance) {
        let init = await initScanner();
        if (!init) return;
    }
    try {
        await scannerInstance.start(currentCameraId, { fps: 10, qrbox: { width: 280, height: 280 }, aspectRatio: 1.0 },
            async (decodedText) => { if (!processingRegs.has(decodedText)) await processScan(decodedText); },
            (error) => { if (error && !error.includes("No MultiFormat Readers")) console.log(error); }
        );
        isScanning = true;
        toast("Scanner siap", "success");
        
        // ANTI FREEZE: Reset scanner every 60 seconds on Android
        if (cameraResetInterval) clearInterval(cameraResetInterval);
        cameraResetInterval = setTimeout(async () => {
            if (isScanning) {
                console.log("Auto-reset scanner for stability");
                await stopScanner();
                await startScanner();
            }
        }, 60000);
    } catch (err) {
        toast("Gagal start kamera: " + err.message, "error");
        isScanning = false;
    }
}

async function stopScanner() {
    if (cameraResetInterval) {
        clearTimeout(cameraResetInterval);
        cameraResetInterval = null;
    }
    if (scannerInstance && isScanning) {
        try { await scannerInstance.stop(); await scannerInstance.clear(); } catch (err) {}
    }
    isScanning = false;
}

function exportToExcel() {
    try {
        if (!window.XLSX) { toast("Excel engine belum siap", "error"); return; }
        let dataForExcel = [];
        Object.entries(visitors).forEach(([siteKey, visitor]) => {
            if (!siteKey.startsWith(SITE_ID + "_")) return;
            let reg = siteKey.replace(SITE_ID + "_", "");
            let jamMasuk = "-", jamKeluar = "-", durasi = "-", keterangan = "";
            if (visitor.sessions && visitor.sessions.length > 0) {
                let last = visitor.sessions[visitor.sessions.length - 1];
                if (last.checkIn) jamMasuk = new Date(last.checkIn).toLocaleString("id-ID");
                if (last.checkOut) jamKeluar = new Date(last.checkOut).toLocaleString("id-ID");
                if (last.checkIn && last.checkOut) durasi = Math.floor((last.checkOut - last.checkIn) / 60000) + " menit";
                keterangan = visitor.currentStatus === "IN" ? "Sedang di dalam" : (last.checkOut ? "Sudah check-out" : "Belum check-in");
            } else keterangan = "Belum pernah check-in";
            if (visitor.expDate && new Date(visitor.expDate) < new Date()) keterangan = "❌ EXPIRED - " + keterangan;
            dataForExcel.push({
                "Nama": visitor.nama || "-", "Perusahaan": visitor.perusahaan || "-", "Tujuan": visitor.tujuan || "-",
                "PIC": visitor.pic || "-", "Start Date": visitor.startDate || "-", "Expired Date": visitor.expDate || "-",
                "Jam Masuk": jamMasuk, "Jam Keluar": jamKeluar, "Durasi": durasi, "Nomor Registrasi": reg, "Keterangan": keterangan
            });
        });
        if (dataForExcel.length === 0) { toast("Tidak ada data", "warning"); return; }
        let ws = XLSX.utils.json_to_sheet(dataForExcel);
        let wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "VMS_Visitor_Report");
        XLSX.writeFile(wb, `VMS_Report_${new Date().toISOString().slice(0, 19).replace(/:/g, "-")}.xlsx`);
        toast("✅ Export Excel berhasil", "success");
    } catch (err) { toast("Export gagal", "error"); }
}

let syncInterval = setInterval(() => { if (navigator.onLine) pullFromSheet(); }, SYNC_INTERVAL_MS);
let queueInterval = setInterval(() => { if (navigator.onLine && syncQueue.length > 0) processQueue(); }, 5000);
window._vmsIntervals.push(syncInterval, queueInterval);

window.addEventListener("beforeunload", () => {
    if (scannerInstance) { try { scannerInstance.stop(); scannerInstance.clear(); } catch (e) {} }
    if (cameraResetInterval) clearTimeout(cameraResetInterval);
    window._vmsIntervals.forEach(clearInterval);
    secureSave();
});

// ==================== SITE RENAME ====================
let vmsSiteData = { names: { SITE_A: "SITE A", SITE_B: "SITE B", SITE_C: "SITE C" } };
function vmsSite_load() { try { let stored = localStorage.getItem("vms_site_names"); if (stored) Object.assign(vmsSiteData.names, JSON.parse(stored)); } catch(e) {} vmsSite_applyToUI(); }
function vmsSite_applyToUI() {
    document.querySelectorAll("[data-site]").forEach(el => { let k = el.getAttribute("data-site"); if (vmsSiteData.names[k]) el.innerText = vmsSiteData.names[k]; });
    document.querySelectorAll("#siteSelector, #siteSelectorTop").forEach(sel => {
        if (!sel) return;
        Array.from(sel.options).forEach(opt => {
            let val = opt.value;
            if (vmsSiteData.names[val]) {
                let icon = opt.textContent.substring(0, 2);
                let hasIcon = icon === "🏭" || icon === "🏢" || icon === "🏬";
                opt.textContent = (hasIcon ? icon + " " : "") + vmsSiteData.names[val];
            }
        });
    });
}
function vmsSite_save() { localStorage.setItem("vms_site_names", JSON.stringify(vmsSiteData.names)); return true; }
function vmsSite_open() { let modal = document.getElementById("vmsSiteModal"); if (modal) { modal.style.display = "flex"; let vmsA = document.getElementById("vmsA"); if (vmsA) vmsA.value = vmsSiteData.names.SITE_A || "SITE A"; let vmsB = document.getElementById("vmsB"); if (vmsB) vmsB.value = vmsSiteData.names.SITE_B || "SITE B"; let vmsC = document.getElementById("vmsC"); if (vmsC) vmsC.value = vmsSiteData.names.SITE_C || "SITE C"; } }
function vmsSite_close() { let modal = document.getElementById("vmsSiteModal"); if (modal) modal.style.display = "none"; }
function vmsSite_submit() {
    let vmsA = document.getElementById("vmsA");
    let vmsB = document.getElementById("vmsB");
    let vmsC = document.getElementById("vmsC");
    if (vmsA) vmsSiteData.names.SITE_A = vmsA.value.trim() || "SITE A";
    if (vmsB) vmsSiteData.names.SITE_B = vmsB.value.trim() || "SITE B";
    if (vmsC) vmsSiteData.names.SITE_C = vmsC.value.trim() || "SITE C";
    vmsSite_applyToUI(); vmsSite_save();
    if (typeof toast === "function") toast("✅ Site names saved!", "success");
    vmsSite_close();
}
vmsSite_load();
</script>
